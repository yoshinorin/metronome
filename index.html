<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A precise metronome that runs in your browser" />
    <title>Metronome</title>
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong mode.
      (() => {
        try {
          const stored = localStorage.getItem('metronome:theme');
          const theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.dataset.theme = theme;
        } catch {
          // Storage may be unavailable; the CSS default theme applies instead.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
